# ----------------------------------------------------------------------------
# [release] @n3ary/gtfs-adapter-cluj-napoca to GH Packages (on push to main)
#
# Triggers on pushes to main when adapter code / package.json /
# tsconfig files change. Detects which adapters changed via
# `git diff` between HEAD~1 and HEAD, then calls
# `n3ary/actions/package/publish@v23` once per adapter via a matrix.
# `workflow_dispatch` is kept for emergency hot-fixes via the
# `version-override` input.
#
# Why `push: branches: [main]` and not `pull_request: closed`:
# The previous `pull_request: closed` trigger was consistently
# "skipped" on every PR merge (job-level `if:` evaluated false
# with no log line, `steps: []`, no runner). Switching to a
# push trigger with a paths filter is simpler, more reliable,
# and naturally binds the publish to the bot's version-bump
# commit landing on main (the bot's release PR is a squash
# merge, so the merge commit lands as a single push).
#
# Trigger:     push to main (paths-filtered), manual
# Permissions: contents: write (tag + push), packages: write (npm),
#              id-token: write (OIDC for SLSA provenance)
# Secrets:     GITHUB_TOKEN, NPM_TOKEN
# Owner:       @ciotlosm
# Run time:    ~1-2 min per adapter
# ----------------------------------------------------------------------------
name: '[release] @n3ary/gtfs-adapter-cluj-napoca to GH Packages (on push to main)'

on:
  push:
    branches: [main]
    paths:
      - 'adapters/*/package.json'
      - 'adapters/*/src/**'
      - 'adapters/*/tsconfig*.json'
      - 'adapters/*/tsconfig.*.json'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:
    inputs:
      adapter:
        description: >-
          Adapter directory name (e.g. `cluj-napoca`). Leave blank
          to auto-detect from package.json changes.
        required: false
        type: string
      version:
        description: >-
          Force a specific version (e.g. `0.3.4`). Triggers the
          workflow_dispatch version-override path in the composite.
        required: false
        type: string

permissions:
  contents: write   # git tag + push (action steps)
  packages: write   # npm publish to GH Packages (action steps)
  id-token: write   # OIDC for SLSA provenance (future-proofing)

jobs:
  detect:
    name: Identify adapters to publish
    # The trigger is either push (any push on main, paths-filtered)
    # or workflow_dispatch. Both are valid; always run.
    runs-on: ubuntu-latest
    outputs:
      adapters: ${{ steps.find.outputs.list }}
      force-version: ${{ steps.find.outputs.force_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Find changed adapter packages
        id: find
        shell: bash
        env:
          INPUT_ADAPTER: ${{ inputs.adapter }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -uo pipefail

          ADAPTERS=""
          FORCE_VERSION=""

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual trigger. Honor explicit adapter input; otherwise
            # publish every adapter dir that has a package.json.
            if [ -n "$INPUT_ADAPTER" ]; then
              ADAPTERS="$INPUT_ADAPTER"
            else
              ADAPTERS=$(find adapters -mindepth 2 -maxdepth 2 \
                          -name package.json -printf '%h\n' \
                        | sed 's#^adapters/##' \
                        | tr '\n' ' ')
            fi
            FORCE_VERSION="$INPUT_VERSION"
          else
            # Push to main. Diff HEAD~1 -> HEAD to find what landed.
            # The paths filter at the trigger level already guarantees
            # the push touched one of the adapter paths, so HEAD~1 is
            # always a valid base. (If the bot's release PR is a
            # squash merge, HEAD~1 is the prior main tip and the
            # squash commit is HEAD; the diff is just the version
            # bump on package.json, which is exactly what we want.)
            BASE_SHA="HEAD~1"
            HEAD_SHA="HEAD"

            # Touching a top-level config file (pnpm-workspace.yaml,
            # adapters/*/tsconfig*.json) doesn't change a specific
            # adapter's package.json, but it does change the build
            # surface for every adapter. Treat that as a "publish all"
            # signal so a tsconfig bump doesn't silently leave
            # downstream consumers on a stale build.
            CHANGED=$(git diff --name-only \
                        --diff-filter=ACMR \
                        "$BASE_SHA" "$HEAD_SHA" \
                        -- 'adapters/*/package.json' \
                           'adapters/*/src/**' \
                           'adapters/*/tsconfig*.json' \
                           'adapters/*/tsconfig.*.json' \
                           'pnpm-workspace.yaml')
            PJSON_CHANGED=$(echo "$CHANGED" \
              | grep -E '^adapters/[^/]+/package\.json$' || true)
            NON_PJSON_CHANGED=$(echo "$CHANGED" \
              | grep -vE '^adapters/[^/]+/package\.json$' || true)

            if [ -n "$PJSON_CHANGED" ]; then
              # Specific adapter packages changed -- publish only those.
              ADAPTERS=$(echo "$PJSON_CHANGED" \
                | awk -F/ '{print $2}' \
                | sort -u \
                | tr '\n' ' ')
            fi

            if [ -n "$NON_PJSON_CHANGED" ]; then
              # tsconfig / shared config changed -- publish everything
              # whose package.json we have, so downstream picks up
              # the new build output.
              ALL=$(find adapters -mindepth 2 -maxdepth 2 \
                      -name package.json -printf '%h\n' \
                    | sed 's#^adapters/##' \
                    | tr '\n' ' ')
              ADAPTERS=$(printf '%s\n%s\n' "$ADAPTERS" "$ALL" \
                          | awk 'NF' | sort -u | tr '\n' ' ')
            fi
          fi

          if [ -z "$ADAPTERS" ]; then
            echo "No adapter changed; skipping."
            echo "list=" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish: $ADAPTERS"
            ADAPTERS_JSON=$(echo "$ADAPTERS" \
              | tr ' ' '\n' \
              | jq -R '. as $a | select($a != "")' \
              | jq -sc '.')
            echo "list=${ADAPTERS_JSON}" >> "$GITHUB_OUTPUT"
          fi
          echo "force_version=${FORCE_VERSION}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.adapter }}
    needs: detect
    if: >-
      needs.detect.outputs.adapters != '' &&
      needs.detect.outputs.adapters != '[]'
    strategy:
      fail-fast: false
      matrix:
        adapter: ${{ fromJSON(needs.detect.outputs.adapters) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Publish adapter
        uses: n3ary/actions/.github/actions/package/publish@v23
        with:
          package-dir: adapters/${{ matrix.adapter }}
          tag-template: 'adapters/{name}/v{version}'
          version-override: ${{ needs.detect.outputs.force_version }}
          access: restricted
          github-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
