name: Publish @n3ary/gtfs-adapter-cluj-napoca

# Publishes adapters/cluj-napoca to GitHub Packages
# (https://npm.pkg.github.com/).
#
# Triggers:
#   - workflow_dispatch with a `version` input (e.g. "0.1.0",
#     "0.2.0-rc.1"). Bumps the package.json version, commits, tags,
#     publishes.
#   - push of a tag matching adapters/cluj-napoca/v* — publishes
#     that exact version.
#
# Authentication: GITHUB_TOKEN with `packages: write`. No additional
# secrets required (the same pattern as n3ary/gtfs's publish-spec).
#
# Consumers (n3ary/gtfs, future adapters) add this to their .npmrc:
#   @n3ary:registry=https://npm.pkg.github.com
# then `npm install @n3ary/gtfs-adapter-cluj-napoca` works.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0, 0.2.0-rc.1). Leave blank to publish the current package.json version as-is.'
        required: false
        type: string
  push:
    tags:
      - 'adapters/cluj-napoca/v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Install dependencies
        # --trust-lockfile: lockfile is part of the source tree and
        # goes through PR review. pnpm-workspace.yaml sets
        # minimumReleaseAge: 0 because every adapter depends on
        # @n3ary/gtfs-spec (also internal, recently published),
        # and we trust our own publish pipeline.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HOME: ${{ runner.temp }}/publish-adapter-clean-home
        run: |
          mkdir -p "$HOME"
          # HOME-scoped .npmrc so pnpm auth reads from a clean location
          # instead of inheriting the project's scope-only .npmrc (which
          # has no _authToken line).
          {
            echo "@n3ary:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$HOME/.npmrc"
          pnpm install --frozen-lockfile --trust-lockfile

      - name: Build adapter package
        run: pnpm --filter @n3ary/gtfs-adapter-cluj-napoca build

      - name: Test adapter package
        run: pnpm --filter @n3ary/gtfs-adapter-cluj-napoca test

      - name: Set version
        id: set-version
        # workflow_dispatch + version input → bump package.json + tag.
        # Tag push → use the version already in the tag.
        # No version input → publish whatever is in package.json.
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Validate version format (semver-ish; prerelease ok)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::Invalid version format: $VERSION (expected e.g. 0.1.0 or 0.2.0-rc.1)"
            exit 1
          fi
          cd adapters/cluj-napoca
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            # Bump + commit + tag + push. The next 'Publish' step reads
            # the updated package.json so the version field is current.
            npm version "$VERSION" --no-git-tag-version
            cd ../..
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add adapters/cluj-napoca/package.json
            git commit -m "chore(release): @n3ary/gtfs-adapter-cluj-napoca v${VERSION}"
            git tag "adapters/cluj-napoca/v${VERSION}"
            git push origin "adapters/cluj-napoca/v${VERSION}" --no-verify
            git push origin HEAD --no-verify
            echo "Bumped: $CURRENT → $VERSION"
          else
            echo "Version already at $VERSION — skipping bump"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOME: ${{ runner.temp }}/publish-adapter-clean-home
        run: |
          mkdir -p "$HOME"
          {
            echo "@n3ary:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$HOME/.npmrc"
          cd adapters/cluj-napoca
          # --access restricted: this package lives in the @n3ary
          # org-scoped registry. The default visibility is private;
          # we'd flip to public only if we want it on npmjs.
          npm publish --provenance --access restricted
        continue-on-error: false
