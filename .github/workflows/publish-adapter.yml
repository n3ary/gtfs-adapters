name: Publish adapters
description: >-
  Triggers on PR merges to main when adapter code / package.json /
  tsconfig files change. Detects which adapters changed via
  `git diff` between base and merge_commit_sha, then calls
  `n3ary/actions/package/publish@v21` once per adapter via a matrix.
  `workflow_dispatch` is kept for emergency hot-fixes via the
  `version-override` input.

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'adapters/*/package.json'
      - 'adapters/*/src/**'
      - 'adapters/*/tsconfig*.json'
      - 'adapters/*/tsconfig.*.json'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:
    inputs:
      adapter:
        description: >-
          Adapter directory name (e.g. `cluj-napoca`). Leave blank
          to auto-detect from package.json changes.
        required: false
        type: string
      version:
        description: >-
          Force a specific version (e.g. `0.3.4`). Triggers the
          workflow_dispatch version-override path in the composite.
        required: false
        type: string

permissions:
  contents: write   # git tag + push (action steps)
  packages: write   # npm publish to GH Packages (action steps)
  id-token: write   # OIDC for SLSA provenance (future-proofing)

jobs:
  detect:
    name: Identify adapters to publish
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == 'true'
    runs-on: ubuntu-latest
    outputs:
      adapters: ${{ steps.find.outputs.list }}
      force-version: ${{ steps.find.outputs.force_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Find changed adapter packages
        id: find
        shell: bash
        env:
          INPUT_ADAPTER: ${{ inputs.adapter }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -uo pipefail

          ADAPTERS=""
          FORCE_VERSION=""

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual trigger. Honor explicit adapter input; otherwise
            # publish every adapter dir that has a package.json.
            if [ -n "$INPUT_ADAPTER" ]; then
              ADAPTERS="$INPUT_ADAPTER"
            else
              ADAPTERS=$(find adapters -mindepth 2 -maxdepth 2 \
                          -name package.json -printf '%h\n' \
                        | sed 's#^adapters/##' \
                        | tr '\n' ' ')
            fi
            FORCE_VERSION="$INPUT_VERSION"
          else
            # PR-merge. Resolve the SHAs and diff for the merge.
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.merge_commit_sha }}"

            # Touching a top-level config file (pnpm-workspace.yaml,
            # adapters/*/tsconfig*.json) doesn't change a specific
            # adapter's package.json, but it does change the build
            # surface for every adapter. Treat that as a "publish all"
            # signal so a tsconfig bump doesn't silently leave
            # downstream consumers on a stale build.
            CHANGED=$(git diff --name-only \
                        --diff-filter=ACMR \
                        "$BASE_SHA" "$HEAD_SHA" \
                        -- 'adapters/*/package.json' \
                           'adapters/*/src/**' \
                           'adapters/*/tsconfig*.json' \
                           'adapters/*/tsconfig.*.json' \
                           'pnpm-workspace.yaml')
            PJSON_CHANGED=$(echo "$CHANGED" \
              | grep -E '^adapters/[^/]+/package\.json$' || true)
            NON_PJSON_CHANGED=$(echo "$CHANGED" \
              | grep -vE '^adapters/[^/]+/package\.json$' || true)

            if [ -n "$PJSON_CHANGED" ]; then
              # Specific adapter packages changed -- publish only those.
              ADAPTERS=$(echo "$PJSON_CHANGED" \
                | awk -F/ '{print $2}' \
                | sort -u \
                | tr '\n' ' ')
            fi

            if [ -n "$NON_PJSON_CHANGED" ]; then
              # tsconfig / shared config changed -- publish everything
              # whose package.json we have, so downstream picks up
              # the new build output.
              ALL=$(find adapters -mindepth 2 -maxdepth 2 \
                      -name package.json -printf '%h\n' \
                    | sed 's#^adapters/##' \
                    | tr '\n' ' ')
              ADAPTERS=$(printf '%s\n%s\n' "$ADAPTERS" "$ALL" \
                          | awk 'NF' | sort -u | tr '\n' ' ')
            fi
          fi

          if [ -z "$ADAPTERS" ]; then
            echo "No adapter changed; skipping."
            echo "list=" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish: $ADAPTERS"
            ADAPTERS_JSON=$(echo "$ADAPTERS" \
              | tr ' ' '\n' \
              | jq -R '. as $a | select($a != "")' \
              | jq -sc '.')
            echo "list=${ADAPTERS_JSON}" >> "$GITHUB_OUTPUT"
          fi
          echo "force_version=${FORCE_VERSION}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.adapter }}
    needs: detect
    if: >-
      needs.detect.outputs.adapters != '' &&
      needs.detect.outputs.adapters != '[]'
    strategy:
      fail-fast: false
      matrix:
        adapter: ${{ fromJSON(needs.detect.outputs.adapters) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Publish adapter
        uses: n3ary/actions/.github/actions/package/publish@v22
        with:
          package-dir: adapters/${{ matrix.adapter }}
          tag-template: 'adapters/{name}/v{version}'
          version-override: ${{ needs.detect.outputs.force_version }}
          access: restricted
          github-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
