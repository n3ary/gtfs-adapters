name: PR Validation

on:
  pull_request:
    branches: [main]

# Shared base PR-validation lives in n3ary/actions and bundles:
#   - ascii-check (commit msgs + PR title)
#   - drift-check (vendored n3ary/standards SHA)
# Repo-specific jobs (validate matrix per adapter) stay local.

permissions:
  contents: write  # adapters/publish action (now version-bump@v12 inside)
                   # pushes bump commits back to PR branch.

jobs:
  shared:
    uses: n3ary/actions/.github/workflows/pr-validation.yml@v22

  validate:
    runs-on: ubuntu-latest
    # Skip Dependabot PRs: GitHub blocks `dependabot[bot]` from
    # accessing repository secrets (NPM_TOKEN) by default, so
    # `pnpm install` would 401 on an empty _authToken. Dependabot
    # PRs only bump version refs in this repo, so the heavy
    # validation adds no signal here. Shared checks (ASCII-only,
    # Standards drift) above still run.
    # Refs:
    #   - https://docs.github.com/en/code-security/dependabot/working-with-dependabot/configuring-access-to-private-packages-for-dependabot-version-updates
    if: github.actor != 'dependabot[bot]'
    strategy:
      fail-fast: false
      matrix:
        adapter: [cluj-napoca]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm with GH Packages auth + install
        # --trust-lockfile: the lockfile is part of the source tree
        # and goes through PR review. pnpm 11's supply-chain
        # re-verification (which rejects freshly-published internal
        # packages within 24h) is bypassed.
        uses: n3ary/actions/.github/actions/setup-pnpm-gh-packages-auth@v22
        with:
          auth-token: ${{ secrets.NPM_TOKEN }}

      - name: Check (matrix adapter)
        run: pnpm --filter @n3ary/gtfs-adapter-${{ matrix.adapter }} check

      - name: Test (matrix adapter)
        run: pnpm --filter @n3ary/gtfs-adapter-${{ matrix.adapter }} test

  auto-bump:
    # Not in required status checks by design. Auto-bump only edits
    # `<adapter>/package.json#version` so it cannot introduce a code
    # regression, and making it required would force every PR to wait
    # for a second CI cycle (the bot pushes a new commit after
    # `validate` passes, which would otherwise re-block the PR with
    # `strict: true` status checks).
    #
    # Required so publish-adapter.yml succeeds on the merged release:
    # without an auto-bump here, the merge-commit's package.json
    # still reads the pre-PR version, npm refuses
    # "you cannot publish over the previously published versions",
    # and the new code never reaches GH Packages. (See
    # gtfs-publisher#128 + the publish-spec failure on #125 for the
    # sibling bug in the publisher repo.)
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [cluj-napoca]
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-bump version (matrix adapter)
        uses: n3ary/actions/.github/actions/version-bump@v12
        with:
          package-dir: adapters/${{ matrix.adapter }}
          # The action's default `bump-skip-paths` already covers
          # .github/, docs/, .gitignore, LICENSE. Adapter source +
          # tsconfig + package.json bumps all trigger the version
          # step; pure workflow changes don't.
