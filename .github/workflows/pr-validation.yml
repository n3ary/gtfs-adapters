name: PR Validation

on:
  pull_request:
    branches: [main]

# Each adapter in adapters/ has its own validate job. The
# standards-drift check runs once on the repo root. The
# ascii-check job runs first (fast-fail) on every PR.

permissions:
  contents: write  # version-bump action

jobs:
  ascii-check:
    # Fail fast before the heavier validate matrix runs.
    # Catches non-ASCII (em-dash, en-dash, arrows, ellipsis,
    # smart quotes, NBSP, ZWJ, ...) in commit messages or PR
    # titles. See .github/actions/ascii-commits README at
    # github.com/n3ary/actions for details.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: ASCII-only check
        uses: n3ary/actions/.github/actions/ascii-commits@v1

  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check vendored standards against n3ary/standards@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          LATEST_SHA=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/n3ary/standards/commits/main \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["sha"][:7])')
          DRIFT=0
          for f in docs/standards/*.md; do
            [ -f "$f" ] || continue
            HEAD=$(head -1 "$f" | grep -oP 'n3ary/standards@\K[a-f0-9]+' || true)
            [ -z "$HEAD" ] && continue
            if [ "$HEAD" != "$LATEST_SHA" ]; then
              echo "Drift: $f vendored at $HEAD, latest is $LATEST_SHA"
              DRIFT=1
            fi
          done
          if [ "$DRIFT" = "1" ]; then
            echo "Drift detected. Wait for the auto-sync PR from n3ary/standards, or run the vendor script locally."
            exit 1
          fi
          echo "All vendored standards up to date with n3ary/standards@main ($LATEST_SHA)."

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [cluj-napoca]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Install dependencies
        # HOME-scoped .npmrc (mirrors the orchestrator's pattern in
        # n3ary/gtfs-publisher/.github/workflows/pr-validation.yml) —
        # pnpm reads auth from .npmrc in HOME, and setting it
        # explicitly avoids inherited state from the runner image.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HOME: ${{ runner.temp }}/gtfs-adapters-pr-clean-home
        run: |
          mkdir -p "$HOME"
          {
            echo "@n3ary:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$HOME/.npmrc"
          # --trust-lockfile: the lockfile is part of the source tree
          # and goes through PR review. We don't need pnpm 11's
          # supply-chain re-verification (which rejects freshly-
          # published internal packages within 24h).
          pnpm install --frozen-lockfile --trust-lockfile
          # Scope the install to the matrix adapter to avoid the
          # workspace neighbours failing on missing secrets.
          pnpm --filter @n3ary/gtfs-adapter-${{ matrix.adapter }} check
          pnpm --filter @n3ary/gtfs-adapter-${{ matrix.adapter }} test
