name: PR Validation

on:
  pull_request:
    branches: [main]

# Shared base PR-validation lives in n3ary/actions and bundles:
#   - ascii-check (commit msgs + PR title)
#   - drift-check (vendored n3ary/standards SHA)
#   - line-length-check (changed files vs 80 chars)
# Repo-specific jobs (validate matrix per adapter) stay local.

permissions:
  contents: write  # version-bump action (legacy; future bump will move
                   # to n3ary/actions too)

jobs:
  shared:
    uses: n3ary/actions/.github/workflows/pr-validation.yml@v5

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [cluj-napoca]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Install dependencies
        # HOME-scoped .npmrc (mirrors the orchestrator's pattern in
        # n3ary/gtfs-publisher/.github/workflows/pr-validation.yml) -
        # pnpm reads auth from .npmrc in HOME, and setting it
        # explicitly avoids inherited state from the runner image.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HOME: ${{ runner.temp }}/gtfs-adapters-pr-clean-home
        run: |
          mkdir -p "$HOME"
          {
            echo "@n3ary:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$HOME/.npmrc"
          # --trust-lockfile: the lockfile is part of the source tree
          # and goes through PR review. We don't need pnpm 11's
          # supply-chain re-verification (which rejects freshly-
          # published internal packages within 24h).
          pnpm install --frozen-lockfile --trust-lockfile
          # Scope the install to the matrix adapter to avoid the
          # workspace neighbours failing on missing secrets.
          pnpm --filter @n3ary/gtfs-adapter-${{ matrix.adapter }} check
          pnpm --filter @n3ary/gtfs-adapter-${{ matrix.adapter }} test