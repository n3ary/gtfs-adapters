# ----------------------------------------------------------------------------
# [check] PR validation (on PR)
#
# Validates every PR: shared ASCII + standards-drift checks, repo-specific
# check + test per adapter (matrix). Never pushes to the branch.
#
# Trigger:     pull_request
# Permissions: contents: read
# Secrets:     NPM_TOKEN (for pnpm install from GH Packages)
# Owner:       @ciotlosm
# Run time:    ~2-4 min
# ----------------------------------------------------------------------------
name: '[check] PR validation (on PR)'

on:
  pull_request:
    branches: [main]

# Shared base PR-validation lives in n3ary/actions and bundles:
#   - ascii-check (commit msgs + PR title)
#   - drift-check (vendored n3ary/standards SHA)
# Repo-specific jobs (validate matrix per adapter) stay local.

permissions:
  contents: read

jobs:
  pr-check:
    uses: n3ary/actions/.github/workflows/pr-check.yml@v24

  validate:
    runs-on: ubuntu-latest
    # Skip Dependabot PRs: GitHub blocks `dependabot[bot]` from
    # accessing repository secrets (NPM_TOKEN) by default, so
    # `pnpm install` would 401 on an empty _authToken. Dependabot
    # PRs only bump version refs in this repo, so the heavy
    # validation adds no signal here. Shared checks (ASCII-only,
    # Standards drift) above still run.
    # Refs:
    #   - https://docs.github.com/en/code-security/dependabot/working-with-dependabot/configuring-access-to-private-packages-for-dependabot-version-updates
    if: github.actor != 'dependabot[bot]'
    strategy:
      fail-fast: false
      matrix:
        adapter: [cluj-napoca]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm with GH Packages auth + install
        # --trust-lockfile: the lockfile is part of the source tree
        # and goes through PR review. pnpm 11's supply-chain
        # re-verification (which rejects freshly-published internal
        # packages within 24h) is bypassed.
        uses: n3ary/actions/.github/actions/setup-pnpm-gh-packages-auth@v24
        with:
          auth-token: ${{ secrets.NPM_TOKEN }}

      - name: Check (matrix adapter)
        run: pnpm --filter @n3ary/gtfs-adapter-${{ matrix.adapter }} check

      - name: Test (matrix adapter)
        run: pnpm --filter @n3ary/gtfs-adapter-${{ matrix.adapter }} test
