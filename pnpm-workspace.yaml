packages:
  - 'adapters/*'

# pnpm 11 blocks postinstall scripts by default. The cluj adapter
# uses sharp (archiver zip writing) + esbuild (vitest/tsx binary
# download) + protobufjs (gtfs-realtime-bindings needs it). Pre-
# approve all of them here. Each adapter can override this in its
# own pnpm-workspace.yaml if it has a different dep profile.
allowBuilds:
  better-sqlite3: true
  esbuild: true
  protobufjs: true
  sharp: true

# pnpm 11 supply-chain policy rejects packages published within
# the minimum release age cutoff (default 24h). Disable for this
# internal monorepo: every adapter depends on @n3ary/gtfs-spec
# (also internal, recently published), and we own the publish
# pipeline — no supply-chain attack surface from recent publishes.
# (Minutes; 0 = no cutoff.)
minimumReleaseAge: 0

# pnpm 11 has a SEPARATE tarball-hash check that runs even when
# minimumReleaseAge is 0: `pnpm install` re-fetches each internal
# dep's tarball and verifies its sha512 against what the registry
# serves now. After a fresh publish (CI re-builds the lockfile +
# GH Packages re-signs the tarball), the two can disagree for ~5
# minutes and produce `ERR_PNPM_TARBALL_URL_MISMATCH` in CI even
# though locally everything works.
#
# Trust policy set to `no-fallback` means "use the lockfile hashes
# as the source of truth, don't re-verify against the live registry"
# — same intent as `--trust-lockfile` on the CLI but persistent.
# The lockfile is part of the source tree and goes through PR
# review, so its hashes are already trusted.
trustPolicy: no-fallback
